<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#171229">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Merge Arcana">
  <meta name="description" content="Карманная merge-tactics игра: собирай отряд, объединяй бойцов и переживи десять раундов.">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="assets/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="assets/icon.svg">
  <link rel="stylesheet" href="styles.css">
  <title>Merge Arcana</title>
</head>
<body>
  <div id="app" class="app-shell">
    <header class="topbar">
      <button class="brand-button" data-action="home" aria-label="На главную">
        <span class="brand-rune">✦</span><span>MERGE ARCANA</span>
      </button>
      <div class="top-resources">
        <span class="resource"><b id="top-coins">0</b> 🪙</span>
        <span class="resource wizard-chip"><b id="top-level">1</b> ур.</span>
      </div>
    </header>

    <main id="screen" class="screen" aria-live="polite"></main>

    <nav id="bottom-nav" class="bottom-nav">
      <button data-action="home"><span>🏰</span><small>Главная</small></button>
      <button data-action="collection"><span>🃏</span><small>Карты</small></button>
      <button data-action="wizard"><span>🧙</span><small>Заклинатель</small></button>
    </nav>

    <aside id="ad-banner" class="ad-banner">
      <span class="ad-label">РЕКЛАМА</span>
      <span>Здесь будет аккуратный баннер бесплатной версии</span>
      <button data-action="premium-preview">Убрать</button>
    </aside>
  </div>

  <div id="modal-root"></div>
  <div id="toast-root" class="toast-root"></div>
  <script type="module" src="js/app.js"></script>
</body>
</html>
