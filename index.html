<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#171229">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Merge Arcana">
  <meta name="description" content="Merge-tactics игра с гекс-ареной, прозрачными характеристиками, синергиями и 2,5D боями.">
  <link rel="manifest" href="manifest.webmanifest?v=0.3.0">
  <link rel="icon" href="assets/icon.svg?v=0.3.0" type="image/svg+xml">
  <link rel="apple-touch-icon" href="assets/icon.svg?v=0.3.0">
  <link rel="stylesheet" href="styles.css?v=0.3.0">
  <link rel="stylesheet" href="styles-v03.css?v=0.3.0">
  <script type="importmap">
    {
      "imports": {
        "./js/art.js": "./js/characters.js?v=0.3.0",
        "./js/data.js": "./js/data.js?v=0.3.0",
        "./js/engine.js": "./js/engine-v03.js?v=0.3.0"
      }
    }
  </script>
  <style>
    .build-label{font-size:7px;opacity:.55;letter-spacing:.04em;margin-left:3px}
    .bottom-nav .wiki-link{border:0;background:transparent;display:grid;gap:1px;justify-items:center;align-content:center;padding:5px;color:var(--muted);border-radius:12px;text-decoration:none;font:inherit}
    .bottom-nav .wiki-link span{font-size:21px}.bottom-nav .wiki-link small{font-size:10px}
    .boot-error{margin:18px;padding:18px;border:1px solid #ff728866;border-radius:20px;background:#321827;color:#fff}
    .boot-error button{width:100%;margin-top:12px;border:0;border-radius:13px;padding:12px;background:#9a70ff;color:#fff;font-weight:800}
  </style>
  <title>Merge Arcana</title>
</head>
<body>
  <div id="app" class="app-shell" data-arena-skin="violet">
    <header class="topbar">
      <button class="brand-button" data-action="home" aria-label="На главную">
        <span class="brand-rune">✦</span><span>MERGE ARCANA <small class="build-label">0.3.0</small></span>
      </button>
      <div class="top-resources">
        <span class="resource"><b id="top-coins">0</b> 🪙</span>
        <span class="resource wizard-chip"><b id="top-level">1</b> ур.</span>
      </div>
    </header>

    <main id="screen" class="screen" aria-live="polite"></main>

    <nav id="bottom-nav" class="bottom-nav" aria-label="Основная навигация" style="grid-template-columns:repeat(5,1fr)">
      <button data-action="home"><span>⌂</span><small>Главная</small></button>
      <button data-action="collection"><span>♜</span><small>Герои</small></button>
      <button data-action="store"><span>◇</span><small>Лавка</small></button>
      <a class="wiki-link" href="wiki.html?v=0.3.0"><span>?</span><small>Вики</small></a>
      <button data-action="wizard"><span>✦</span><small>Архонт</small></button>
    </nav>

    <aside id="ad-banner" class="ad-banner">
      <span class="ad-label">РЕКЛАМА</span>
      <span>Баннер бесплатной версии · в бою скрыт</span>
      <button data-action="premium-preview">Убрать</button>
    </aside>
  </div>

  <div id="modal-root"></div>
  <div id="toast-root" class="toast-root"></div>
  <script type="module">
    const BUILD = '0.3.0';
    const buildKey = 'merge-arcana-loaded-build';
    try {
      if (localStorage.getItem(buildKey) !== BUILD) {
        if ('caches' in window) {
          const keys = await caches.keys();
          await Promise.all(keys.filter((key) => key.startsWith('merge-arcana-')).map((key) => caches.delete(key)));
        }
        localStorage.setItem(buildKey, BUILD);
        const registration = await navigator.serviceWorker?.getRegistration?.();
        await registration?.update?.();
      }
      await import(`./js/app.js?v=${BUILD}`);
      await import(`./js/v03-ui.js?v=${BUILD}`);
    } catch (error) {
      console.error('Merge Arcana boot failed', error);
      document.querySelector('#screen').innerHTML = `<section class="boot-error"><h2>Файлы игры обновились не полностью</h2><p>Safari сохранил смесь старой и новой версии. Прогресс не удалится.</p><button id="repair-game">Очистить кэш игры и перезапустить</button></section>`;
      document.querySelector('#repair-game')?.addEventListener('click', async () => {
        if ('caches' in window) await Promise.all((await caches.keys()).filter((key) => key.startsWith('merge-arcana-')).map((key) => caches.delete(key)));
        for (const registration of await navigator.serviceWorker.getRegistrations()) await registration.unregister();
        location.reload();
      });
    }
  </script>
</body>
</html>
